apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-app-prod
  namespace: argocd
  labels:
    app.kubernetes.io/name: platform-app
    platform.environment: prod
spec:
  project: platform-app-project
  source:
    repoURL: https://gitlab.com/example-org/platform-gitops.git
    targetRevision: main
    path: charts/platform-app
    helm:
      valueFiles:
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: platform-prod
