nameOverride: ""
fullnameOverride: ""

replicaCount: 2

image:
  repository: registry.example.com/platform-app
  tag: "latest"
  digest: ""
  pullPolicy: IfNotPresent

container:
  port: 8080
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 10001
    capabilities:
      drop:
        - ALL

podSecurityContext:
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

podLabels: {}
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/path: /metrics
  prometheus.io/port: "8080"

service:
  type: ClusterIP
  port: 8080
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /metrics
    prometheus.io/port: "8080"

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

probes:
  liveness:
    path: /livez
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
  readiness:
    path: /readyz
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3

metrics:
  enabled: true
  path: /metrics
  port: 8080

serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  labels: {}

config:
  enabled: true
  data:
    APP_LOG_LEVEL: info
    APP_ENV: base

env: {}

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: platform-app.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
