replicaCount: 3

image:
  tag: "prod-latest"
  digest: ""

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1024Mi"

config:
  data:
    APP_ENV: prod

env:
  APP_LOG_LEVEL: info

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70
